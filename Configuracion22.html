<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Configuración - SmartCare CNS</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="styles.css">

</head>

<body>

<div class="container mt-5">

<h2 class="mb-4">Configuración</h2>

<!-- Preferencias del sistema -->
<div class="card mb-4">
<div class="card-header">
<strong>Preferencias del sistema</strong>
</div>

<div class="card-body">

<div class="form-check mb-2">
<input class="form-check-input" type="checkbox" id="notificaciones">
<label class="form-check-label">
Activar notificaciones
</label>
</div>

<div class="mb-3">
<label class="form-label">Idioma</label>
<select class="form-select">
<option>Español</option>
<option>English</option>
</select>
</div>

</div>
</div>

<!-- Horario del hospital -->

<div class="card mb-4">
<div class="card-header">
<strong>Horario del Hospital</strong>
</div>

<div class="card-body">

<div class="mb-2">
<label class="form-label">Lunes a Viernes</label>
<input type="text" class="form-control" placeholder="08:00 - 20:00">
</div>

<div class="mb-2">
<label class="form-label">Sábado</label>
<input type="text" class="form-control" placeholder="08:00 - 14:00">
</div>

<div class="mb-2">
<label class="form-label">Domingo</label>
<input type="text" class="form-control" placeholder="Cerrado">

<!-- Datos del Hospital -->
<div class="card mb-4">
  <div class="card-header">
    <strong>Datos del Hospital</strong>
  </div>
  <div class="card-body">

    <div class="mb-3">
      <label class="form-label">Nombre del Hospital</label>
      <input type="text" class="form-control" value="Hospital Obrero N°1">
    </div>

    <div class="mb-3">
      <label class="form-label">Dirección</label>
      <input type="text" class="form-control" value="La Paz, Bolivia">
    </div>

    <div class="mb-3">
      <label class="form-label">Teléfono</label>
      <input type="tel" class="form-control" value="+591 12345678">
    </div>

    <div class="mb-3">
      <label class="form-label">Correo institucional</label>
      <input type="email" class="form-control" value="contacto@hospital.com">
    </div>

  </div>
</div>
</div>
</div>
</div>
</div>
</body>
</html>
