<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartCare CNS - Iniciar Sesión</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="styles.css">
</head>
<body class="login-body">
    <div class="login-container row g-0">
        <!-- Formulario de Login -->
        <div class="col-md-6 login-form">
            <div class="d-flex align-items-center gap-2 mb-4">
                <span class="logo-atom text-info fs-3">⚛️</span>
                <h4 class="mb-0">SMARTCARE CNS</h4>
            </div>
            <small class="d-block mb-4 text-muted">Sistema inteligente de gestión y optimización citas médicas</small>

            <!-- Tabs para Iniciar Sesión / Registrarse -->
            <ul class="nav nav-tabs mb-4">
                <li class="nav-item">
                    <a class="nav-link active" href="#">Iniciar sesión</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="registrarse.html">Registrarse</a>
                </li>
            </ul>

            <form onsubmit="iniciarSesion(); return false;">
                <div class="mb-3">
                    <label class="form-label">Correo electrónico</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="bi bi-envelope"></i></span>
                        <input type="email" class="form-control" placeholder="Correo electrónico" required>
                    </div>
                </div>
                <div class="mb-3">
                    <label class="form-label">Contraseña</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="bi bi-lock"></i></span>
                        <input type="password" class="form-control" placeholder="Contraseña" required>
                    </div>
                </div>
                <div class="form-check mb-3">
                    <input type="checkbox" class="form-check-input" id="remember">
                    <label class="form-check-label" for="remember">Recordarme</label>
                </div>
                <button type="submit" class="btn btn-primary w-100 mb-3">Iniciar Sesión</button>
                <small class="d-block text-center">¿Olvidaste tu contraseña? <a href="#">Recupérala aquí</a></small>
                <small class="d-block text-center mt-3">¿No tienes una cuenta? <a href="registrarse.html">Regístrate</a></small>
            </form>
        </div>

        <!-- Ilustración -->
        <div class="col-md-6 illustration text-center">
            <img src="doc.png" alt="Ilustración de médico" class="img-fluid">
            <h5 class="mt-3">Gestiona tus citas médicas de forma rápida y sencilla</h5>
        </div>
    </div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
    function iniciarSesion() {
        window.location.href = 'index.html';  // Redirige a index.html
    }
</script>
</body>
</html>
